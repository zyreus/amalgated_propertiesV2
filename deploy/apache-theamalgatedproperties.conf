# Amalgated Properties — local domain → Vite frontend + Node API
# Requires: mod_proxy, mod_proxy_http, mod_proxy_wstunnel
# After editing: restart Apache from XAMPP Control Panel

<VirtualHost *:80>
    ServerName theamalgatedproperties.com
    ServerAlias www.theamalgatedproperties.com

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"

    ProxyPass /socket.io ws://127.0.0.1:8020/socket.io
    ProxyPassReverse /socket.io ws://127.0.0.1:8020/socket.io
    ProxyPass /api http://127.0.0.1:8020/api
    ProxyPassReverse /api http://127.0.0.1:8020/api
    ProxyPass / http://127.0.0.1:6175/
    ProxyPassReverse / http://127.0.0.1:6175/
</VirtualHost>

<VirtualHost *:443>
    ServerName theamalgatedproperties.com
    ServerAlias www.theamalgatedproperties.com

    SSLEngine on
    SSLCertificateFile "conf/ssl.crt/server.crt"
    SSLCertificateKeyFile "conf/ssl.key/server.key"

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    ProxyPass /socket.io ws://127.0.0.1:8020/socket.io
    ProxyPassReverse /socket.io ws://127.0.0.1:8020/socket.io
    ProxyPass /api http://127.0.0.1:8020/api
    ProxyPassReverse /api http://127.0.0.1:8020/api
    ProxyPass / http://127.0.0.1:6175/
    ProxyPassReverse / http://127.0.0.1:6175/
</VirtualHost>
